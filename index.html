<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escáner de bodega</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #212529;
      color: white;
      touch-action: manipulation;
    }
    .scanner-container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }
    #reader {
      width: 100%;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 15px;
      background: #000;
      position: relative;
    }
    #reader::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      width: 80%;
      height: 2px;
      background: rgba(0, 255, 0, 0.7);
      box-shadow: 0 0 8px rgba(0,255,0,0.5);
      z-index: 10;
      animation: scan-line 2s ease-in-out infinite alternate;
    }
    @keyframes scan-line {
      from { transform: translateY(-15px); }
      to { transform: translateY(15px); }
    }
    .card {
      background: #343a40;
      border: none;
    }
    .btn-detener, .btn-linterna {
      display: none;
    }
    .resultado {
      background: #198754;
      padding: 10px;
      border-radius: 8px;
    }
    .error {
      background: #dc3545;
      padding: 10px;
      border-radius: 8px;
    }
    .warning {
      background: #ffc107;
      color: #000;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="scanner-container">
    <h2 class="text-center mb-3">📷 Escáner inteligente</h2>
    <div id="reader"></div>
    <div class="d-grid gap-2 mb-2">
      <button id="btn-iniciar" class="btn btn-primary btn-lg">▶️ Iniciar cámara</button>
      <button id="btn-detener" class="btn btn-outline-danger btn-detener">⏹️ Detener</button>
      <button id="btn-linterna" class="btn btn-outline-warning btn-linterna">🔦 Linterna</button>
    </div>
    <div id="status-message"></div>
    <div id="resultado-escaneo" class="mt-3"></div>

    <div id="form-entrada" class="card mt-3 p-3" style="display: none;">
      <h5 id="form-titulo" class="text-success">Producto encontrado</h5>
      
      <p id="nombre-producto" class="fw-bold" style="display: none;"></p>
      
      <div id="div-nuevo-producto" class="mb-2" style="display: none;">
        <label class="form-label text-warning fw-bold">Nombre del nuevo producto *</label>
        <input type="text" id="nuevo-nombre-movil" class="form-control bg-dark text-white border-warning" placeholder="Ej. Galletas Chokis 50g">
      </div>

      <div class="mb-2">
        <label class="form-label">Cantidad</label>
        <input type="number" id="cantidad-movil" class="form-control" min="1" value="1">
      </div>
      <div class="mb-3">
        <label class="form-label">Precio unitario ($)</label>
        <input type="number" id="precio-movil" class="form-control" step="0.01" min="0" value="0.00">
      </div>
      <button id="guardar-movil" class="btn btn-success w-100 fw-bold">💾 Guardar en Base de Datos</button>
      <button id="cancelar-movil" class="btn btn-outline-light w-100 mt-2">Cancelar</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function() {
      console.log('🚀 Escáner Inteligente Autónomo v3.0');

      if (typeof Html5Qrcode === 'undefined' || typeof window.supabase === 'undefined') {
        document.getElementById('status-message').innerHTML = '<div class="error">❌ Error de conexión de librerías. Recarga la página.</div>';
        return;
      }

      const SUPABASE_URL = "https://omgfilhksmfvbprzejxg.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZ2ZpbGhrc21mdmJwcnplanhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNzU0NTgsImV4cCI6MjA5ODk1MTQ1OH0.6JpnsUYiuLJ_Jty_PtBSOFxfbLl0r7reiYnnvXoBJpQ";
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let html5QrCode = null;
      let productoActual = null;       // Almacenará los datos si existe
      let codigoEscaneadoActual = "";  // Guardará el string del código de barras
      let esProductoNuevo = false;     // Interruptor lógico
      let linternaEncendida = false;

      const btnIniciar = document.getElementById('btn-iniciar');
      const btnDetener = document.getElementById('btn-detener');
      const btnLinterna = document.getElementById('btn-linterna');
      const statusMsg = document.getElementById('status-message');
      const resultadoDiv = document.getElementById('resultado-escaneo');
      const formDiv = document.getElementById('form-entrada');

      const formatsToSupport = [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.QR_CODE
      ];

      async function stopCamera() {
        if (html5QrCode && (html5QrCode.isScanning || (html5QrCode.getState && html5QrCode.getState() === 2))) {
          try { await html5QrCode.stop(); } catch (e) { console.warn(e); }
        }
        html5QrCode = null;
        btnIniciar.style.display = 'block';
        btnDetener.style.display = 'none';
        btnLinterna.style.display = 'none';
        linternaEncendida = false;
        btnLinterna.textContent = '🔦 Linterna';
      }

      async function toggleTorch() {
        if (!html5QrCode || !html5QrCode.isScanning) return;
        try {
          const capabilities = html5QrCode.getRunningTrackCapabilities();
          if (capabilities && capabilities.torch) {
            linternaEncendida = !linternaEncendida;
            await html5QrCode.applyVideoConstraints({ advanced: [{ torch: linternaEncendida }] });
            btnLinterna.textContent = linternaEncendida ? '💡 Apagar linterna' : '🔦 Linterna';
          } else { alert('Linterna no soportada en este dispositivo.'); }
        } catch (e) { console.error(e); }
      }

      async function startCamera() {
        await stopCamera();
        statusMsg.innerHTML = '';
        resultadoDiv.innerHTML = '';
        formDiv.style.display = 'none';
        productoActual = null;
        codigoEscaneadoActual = "";
        esProductoNuevo = false;

        try {
          html5QrCode = new Html5Qrcode("reader");
          const config = {
            fps: 12,
            qrbox: { width: 280, height: 120 },
            aspectRatio: 1.777,
            formatsToSupport: formatsToSupport,
          };

          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
              if (navigator.vibrate) navigator.vibrate(200);
              html5QrCode.stop().then(() => {
                btnIniciar.style.display = 'block';
                btnDetener.style.display = 'none';
                btnLinterna.style.display = 'none';
                buscarProducto(decodedText.trim());
              }).catch(err => console.warn(err));
            },
            (errorMessage) => {}
          );

          btnIniciar.style.display = 'none';
          btnDetener.style.display = 'block';
          try {
            const track = html5QrCode.getRunningTrackCapabilities();
            if (track && track.torch) btnLinterna.style.display = 'block';
          } catch (e) {}
          statusMsg.innerHTML = '<div class="text-info">🔍 Apunta al código de barras...</div>';
        } catch (err) {
          console.error(err);
          statusMsg.innerHTML = `<div class="error">❌ No se pudo iniciar cámara: ${err.message || err}</div>`;
        }
      }

      // ── LÓGICA DE BÚSQUEDA Y ADAPTACIÓN EN EL TELÉFONO ──
      async function buscarProducto(codigo) {
        codigoEscaneadoActual = codigo; 
        statusMsg.innerHTML = '';

        try {
          const { data, error } = await client.from('productos').select('*').eq('codigo_barras', codigo).single();

          if (error || !data) {
            // CASO A: EL CÓDIGO NO EXISTE -> Cambiar interfaz para registrar como nuevo
            esProductoNuevo = true;
            productoActual = null;

            resultadoDiv.innerHTML = `<div class="warning">⚠️ Código [${codigo}] NO registrado.</div>`;
            
            // Ajustar el formulario
            document.getElementById('form-titulo').textContent = "🆕 Registrar Nuevo Producto";
            document.getElementById('form-titulo').className = "text-warning fw-bold";
            document.getElementById('nombre-producto').style.display = 'none';
            document.getElementById('div-nuevo-producto').style.display = 'block'; // Mostrar input de texto
            
            // Resetear inputs
            document.getElementById('nuevo-nombre-movil').value = '';
            document.getElementById('cantidad-movil').value = 1;
            document.getElementById('precio-movil').value = '0.00';
            
            formDiv.style.display = 'block';
            document.getElementById('nuevo-nombre-movil').focus();
          } else {
            // CASO B: EL CÓDIGO YA EXISTE -> Flujo normal de entrada
            esProductoNuevo = false;
            productoActual = data;

            resultadoDiv.innerHTML = `<div class="resultado">✅ Producto detectado correctamente</div>`;
            
            // Ajustar el formulario
            document.getElementById('form-titulo').textContent = "✅ Registrar Entrada";
            document.getElementById('form-titulo').className = "text-success fw-bold";
            document.getElementById('div-nuevo-producto').style.display = 'none'; // Ocultar input de texto
            document.getElementById('nombre-producto').style.display = 'block';
            document.getElementById('nombre-producto').textContent = data.nombre;
            
            // Pre-cargar el precio de costo anterior
            document.getElementById('cantidad-movil').value = 1;
            document.getElementById('precio-movil').value = data.precio_compra || 0;
            
            formDiv.style.display = 'block';
          }
        } catch (err) {
          console.error(err);
          resultadoDiv.innerHTML = '<div class="error">Error al conectar con Supabase.</div>';
        }
      }

      // ── PROCESAR GUARDADO AUTOMÁTICO EN EL TELÉFONO ──
      document.getElementById('guardar-movil').addEventListener('click', async () => {
        const cantidad = parseInt(document.getElementById('cantidad-movil').value);
        const precio = parseFloat(document.getElementById('precio-movil').value);

        if (isNaN(cantidad) || cantidad <= 0) return alert('Por favor, ingrese una cantidad válida');
        if (isNaN(precio) || precio < 0) return alert('Por favor, ingrese un precio válido');

        try {
          let productoId = null;
          let nombreFinal = "";

          if (esProductoNuevo) {
            // 1. Si es nuevo, primero creamos el producto en la tabla 'productos'
            const nombreNuevo = document.getElementById('nuevo-nombre-movil').value.trim();
            if (!nombreNuevo) return alert('Debes escribir un nombre para el producto nuevo');
            nombreFinal = nombreNuevo;

            const { data: nuevoProd, error: errProd } = await client.from('productos').insert({
              codigo_barras: codigoEscaneadoActual,
              nombre: nombreNuevo,
              precio_compra: precio // Guarda el precio actual como referencia inicial
            }).select().single();

            if (errProd) throw errProd;
            productoId = nuevoProd.id; // Obtenemos el ID asignado por la base de datos
          } else {
            // 2. Si ya existía, usamos su ID actual e igual actualizamos su costo de referencia
            productoId = productoActual.id;
            nombreFinal = productoActual.nombre;

            await client.from('productos').update({ 
              precio_compra: precio 
            }).eq('id', productoId);
          }

          // 3. Insertar la transacción de entrada en 'entradas_inventario'
          const { error: errEntrada } = await client.from('entradas_inventario').insert({
            producto_id: productoId,
            cantidad: cantidad,
            precio_unitario: precio
          });

          if (errEntrada) throw errEntrada;

          // Todo salió bien
          alert(`🎉 Éxito:\nSe guardaron ${cantidad} unidades de "${nombreFinal}" correctamente.`);
          
          // Limpiar pantalla para el próximo escaneo
          formDiv.style.display = 'none';
          resultadoDiv.innerHTML = '';
          productoActual = null;
          esProductoNuevo = false;
          btnIniciar.style.display = 'block';

        } catch (err) {
          console.error(err);
          alert('Error crítico al procesar la operación: ' + err.message);
        }
      });

      document.getElementById('cancelar-movil').addEventListener('click', () => {
        formDiv.style.display = 'none';
        resultadoDiv.innerHTML = '';
        productoActual = null;
        esProductoNuevo = false;
        btnIniciar.style.display = 'block';
      });

      btnIniciar.addEventListener('click', startCamera);
      btnDetener.addEventListener('click', stopCamera);
      btnLinterna.addEventListener('click', toggleTorch);

      window.addEventListener('load', () => { btnIniciar.style.display = 'block'; });
    })();
  </script>
</body>
</html>
