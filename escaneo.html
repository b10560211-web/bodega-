<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bodega - Escáner Móvil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background: #f8f9fa; padding-bottom: 50px; }
    .card { border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: none; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; border: 2px solid #0d6efd; }
    .bcv-badge { background: #e2e3e5; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
    .preview-usd { font-size: 0.85rem; color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>

  <div class="bg-primary text-white p-3 shadow-sm d-flex justify-content-between align-items-center mb-3">
    <h5 class="m-0"><i class="bi bi-upc-scan me-2"></i>Escáner de Bodega</h5>
    <div id="tasa-bcv-display" class="bcv-badge text-dark">Tasa BCV: Cargando...</div>
  </div>

  <div class="container">
    <div class="card mb-3">
      <div class="card-body p-2 text-center">
        <div id="reader" class="mb-2"></div>
        <button id="btn-scan" class="btn btn-outline-primary w-100 fw-bold">
          <i class="bi bi-camera me-2"></i>Activar Cámara
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h6 class="card-title fw-bold text-secondary mb-3 border-bottom pb-2">Datos del Producto</h6>
        
        <div class="mb-3">
          <label class="form-label small text-muted">Código de Barras</label>
          <div class="input-group">
            <input type="text" id="codigo" class="form-control" placeholder="Ej: 759123456789">
            <button class="btn btn-secondary" id="btn-buscar"><i class="bi bi-search"></i></button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Nombre del Producto</label>
          <input type="text" id="nombre" class="form-control" placeholder="Ej: Harina Pan 1kg">
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label small text-muted">Costo (Bs)</label>
            <input type="number" id="costo-bs" class="form-control border-danger" step="0.01" min="0" placeholder="0.00">
            <div class="preview-usd mt-1" id="costo-usd-preview">Eq: $0.00</div>
          </div>
          <div class="col-6">
            <label class="form-label small text-muted">PVP Venta ($)</label>
            <input type="number" id="pvp-usd" class="form-control border-success" step="0.01" min="0" placeholder="0.00">
            <div class="mt-1" style="font-size: 0.85rem; color: #198754; font-weight: bold;" id="pvp-bs-preview">Eq: Bs 0.00</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Cantidad a Ingresar (Stock)</label>
          <input type="number" id="cantidad" class="form-control form-control-lg text-center" value="1" min="1">
        </div>

        <button id="btn-guardar" class="btn btn-success w-100 py-2 fw-bold fs-5 shadow-sm">
          <i class="bi bi-save me-2"></i>Guardar en Sistema
        </button>
        
        <div id="mensaje" class="mt-3 text-center fw-bold"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script>
    (function() {
      // Configuración Supabase
      const SUPABASE_URL = "https://omgfilhksmfvbprzejxg.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZ2ZpbGhrc21mdmJwcnplanhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNzU0NTgsImV4cCI6MjA5ODk1MTQ1OH0.6JpnsUYiuLJ_Jty_PtBSOFxfbLl0r7reiYnnvXoBJpQ";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let tasaDolar = 1; // Fallback
      let productoIdActual = null;
      let html5QrcodeScanner = null;

      // ──────── TASA BCV ────────
      async function obtenerTasaBCV() {
        try {
          const resp = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
          const data = await resp.json();
          tasaDolar = parseFloat(data.promedio);
          document.getElementById('tasa-bcv-display').innerHTML = `BCV: Bs ${tasaDolar.toFixed(2)}`;
        } catch (error) {
          console.error("Error BCV:", error);
          document.getElementById('tasa-bcv-display').innerHTML = `<span class="text-danger">BCV Error</span>`;
        }
      }

      obtenerTasaBCV();

      // ──────── CÁLCULOS DINÁMICOS EN PANTALLA ────────
      const inputCostoBs = document.getElementById('costo-bs');
      const previewCostoUsd = document.getElementById('costo-usd-preview');
      
      const inputPvpUsd = document.getElementById('pvp-usd');
      const previewPvpBs = document.getElementById('pvp-bs-preview');

      inputCostoBs.addEventListener('input', () => {
        let bs = parseFloat(inputCostoBs.value) || 0;
        let usd = bs / tasaDolar;
        previewCostoUsd.innerText = `Eq: $${usd.toFixed(2)}`;
        
        // Sugerir PVP si está vacío (Costo + 30% por ejemplo, ajusta a tu gusto)
        if(inputPvpUsd.value === "" && usd > 0) {
            inputPvpUsd.value = (usd * 1.30).toFixed(2);
            inputPvpUsd.dispatchEvent(new Event('input')); // Forzar cálculo de PVP en Bs
        }
      });

      inputPvpUsd.addEventListener('input', () => {
        let usd = parseFloat(inputPvpUsd.value) || 0;
        let bs = usd * tasaDolar;
        previewPvpBs.innerText = `Eq: Bs ${bs.toFixed(2)}`;
      });

      // ──────── ESCÁNER DE CÁMARA ────────
      document.getElementById('btn-scan').addEventListener('click', () => {
        if (!html5QrcodeScanner) {
          html5QrcodeScanner = new Html5Qrcode("reader");
          const config = { fps: 10, qrbox: { width: 250, height: 150 }, facingMode: "environment" };
          
          html5QrcodeScanner.start({ facingMode: "environment" }, config, 
            (decodedText) => {
              // Éxito al escanear
              document.getElementById('codigo').value = decodedText;
              buscarProducto(decodedText);
              // Detener escáner temporalmente
              html5QrcodeScanner.stop();
              document.getElementById('btn-scan').innerHTML = '<i class="bi bi-camera me-2"></i>Escanear de nuevo';
            },
            (error) => { /* ignorar errores de frame */ }
          ).catch(err => alert("Error con la cámara. Verifica los permisos."));
        } else {
          html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, ...callbacks);
        }
      });

      // ──────── BUSCAR PRODUCTO ────────
      document.getElementById('btn-buscar').addEventListener('click', () => {
        const codigo = document.getElementById('codigo').value.trim();
        if (codigo) buscarProducto(codigo);
      });

      async function buscarProducto(codigo) {
        mostrarMensaje("Buscando...", "text-primary");
        const { data, error } = await supabase.from('productos').select('*').eq('codigo_barras', codigo).single();
        
        if (data) {
          productoIdActual = data.id;
          document.getElementById('nombre').value = data.nombre;
          
          // Mostrar el costo anterior convertido a Bs para referencia
          const costoAnteriorUsd = parseFloat(data.precio_compra || 0);
          inputCostoBs.value = (costoAnteriorUsd * tasaDolar).toFixed(2);
          inputCostoBs.dispatchEvent(new Event('input')); // Disparar conversión
          
          inputPvpUsd.value = parseFloat(data.precio_venta || 0).toFixed(2);
          inputPvpUsd.dispatchEvent(new Event('input')); // Disparar conversión
          
          mostrarMensaje("Producto encontrado. Actualiza datos si es necesario.", "text-success");
        } else {
          productoIdActual = null;
          document.getElementById('nombre').value = "";
          inputCostoBs.value = "";
          inputPvpUsd.value = "";
          previewCostoUsd.innerText = "Eq: $0.00";
          previewPvpBs.innerText = "Eq: Bs 0.00";
          mostrarMensaje("Producto nuevo. Llena los datos para registrarlo.", "text-warning");
        }
      }

      // ──────── GUARDAR DATOS ────────
      document.getElementById('btn-guardar').addEventListener('click', async () => {
        const codigo = document.getElementById('codigo').value.trim();
        const nombre = document.getElementById('nombre').value.trim();
        const costoBs = parseFloat(inputCostoBs.value);
        const pvpUsd = parseFloat(inputPvpUsd.value);
        const cantidad = parseInt(document.getElementById('cantidad').value);

        if (!codigo || !nombre || isNaN(costoBs) || isNaN(pvpUsd) || isNaN(cantidad)) {
          mostrarMensaje("Por favor, llena todos los campos correctamente.", "text-danger");
          return;
        }

        // Conversión final a USD para guardar en DB
        const costoUsd = costoBs / tasaDolar;
        const btn = document.getElementById('btn-guardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        try {
          let prodId = productoIdActual;

          // 1. Guardar o Actualizar Producto
          if (prodId) {
            await supabase.from('productos').update({
              nombre: nombre,
              precio_compra: costoUsd,
              precio_venta: pvpUsd
            }).eq('id', prodId);
          } else {
            const { data: nuevoProd, error: errInsert } = await supabase.from('productos').insert({
              codigo_barras: codigo,
              nombre: nombre,
              precio_compra: costoUsd,
              precio_venta: pvpUsd
            }).select().single();
            
            if (errInsert) throw errInsert;
            prodId = nuevoProd.id;
          }

          // 2. Registrar Entrada de Inventario (Sumar Stock)
          const { error: errEntrada } = await supabase.from('entradas_inventario').insert({
            producto_id: prodId,
            cantidad: cantidad,
            precio_unitario: costoUsd
          });

          if (errEntrada) throw errEntrada;

          mostrarMensaje("¡Guardado con éxito!", "text-success");
          
          // Limpiar formulario para el siguiente escaneo
          setTimeout(() => {
            document.getElementById('codigo').value = "";
            document.getElementById('nombre').value = "";
            inputCostoBs.value = "";
            inputPvpUsd.value = "";
            document.getElementById('cantidad').value = "1";
            previewCostoUsd.innerText = "Eq: $0.00";
            previewPvpBs.innerText = "Eq: Bs 0.00";
            productoIdActual = null;
            document.getElementById('mensaje').innerHTML = "";
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-save me-2"></i>Guardar en Sistema';
          }, 2000);

        } catch (error) {
          console.error(error);
          mostrarMensaje("Error al guardar en la base de datos.", "text-danger");
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-save me-2"></i>Guardar en Sistema';
        }
      });

      function mostrarMensaje(texto, clase) {
        const msgDiv = document.getElementById('mensaje');
        msgDiv.className = `mt-3 text-center fw-bold ${clase}`;
        msgDiv.innerText = texto;
      }

    })();
  </script>
</body>
</html>
