<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bodega Móvil · App Completa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f0f4ff 0%, #e8f0fe 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
      padding: 16px 12px 32px; color: #1a1e2b;
    }
    .app-container {
      width: 100%; max-width: 420px; background: rgba(255,255,255,0.75);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-radius: 36px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
      overflow: hidden; display: flex; flex-direction: column; gap: 16px;
      padding: 20px 16px 24px; border: 1px solid rgba(255,255,255,0.6);
    }
    .screen { display: none; flex-direction: column; gap: 16px; }
    .screen.active { display: flex; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px 8px; }
    .brand { display: flex; align-items: center; gap: 6px; }
    .brand-icon { background: #2563eb; color: white; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .brand-text { font-weight: 700; font-size: 1.2rem; color: #0f172a; }
    .tasa-chip { background: #f0fdf4; border-radius: 30px; padding: 8px 14px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; border: 1px solid #d1d5db; color: #065f46; }
    .card { background: white; border-radius: 24px; padding: 18px 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); }
    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-weight: 600; color: #1e293b; }
    .card-header i { font-size: 1.3rem; color: #2563eb; }
    .btn {
      border: none; border-radius: 18px; padding: 12px 16px; font-weight: 600; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s; width: 100%;
    }
    .btn-primary { background: #2563eb; color: white; box-shadow: 0 8px 16px -6px #2563eb; }
    .btn-success { background: #059669; color: white; box-shadow: 0 8px 16px -6px #059669; }
    .btn-outline { background: #f9fafb; border: 2px solid #e2e8f0; color: #1e293b; }
    .btn:active { transform: scale(0.97); }
    .input-group { display: flex; align-items: center; background: #f8fafc; border-radius: 14px; padding: 2px; border: 1px solid #e2e8f0; }
    .input-group span { padding: 0 10px; color: #64748b; }
    .input-group input { border: none; background: transparent; padding: 10px 6px; font-size: 0.9rem; width: 100%; outline: none; }
    .input-standard { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; outline: none; }
    .scanner-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #f8fafc; border-radius: 20px; overflow: hidden; border: 2px dashed #94a3b8; margin-bottom: 12px; }
    .flash-btn { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: none; cursor: pointer; z-index: 20; }
    .flash-btn.active { background: #facc15; color: #000; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .cart-item .info { flex: 2; }
    .cart-item .qty-control { display: flex; align-items: center; gap: 8px; }
    .cart-item .qty-control button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #e2e8f0; background: white; font-weight: bold; cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .home-grid { display: flex; gap: 16px; }
    .home-card { flex: 1; background: white; border-radius: 20px; padding: 24px 12px; text-align: center; box-shadow: 0 6px 18px rgba(0,0,0,0.04); cursor: pointer; }
    .home-card i { font-size: 2.2rem; color: #2563eb; margin-bottom: 10px; }
    .home-card .title { font-weight: 700; }
    .badge { background: #e2e8f0; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="status-bar">
    <div class="brand"><div class="brand-icon"><i class="bi bi-box-seam"></i></div><span class="brand-text">Bodega</span></div>
    <div class="tasa-chip"><i class="bi bi-bank"></i> <span id="tasa-valor">Cargando...</span></div>
  </div>

  <!-- Inicio -->
  <div class="screen active" id="screenInicio">
    <div class="home-grid">
      <div class="home-card" onclick="cambiarModo('ingreso')"><i class="bi bi-box-arrow-in-down"></i><div class="title">Ingreso</div><small>Agregar stock</small></div>
      <div class="home-card" onclick="cambiarModo('ventas')"><i class="bi bi-cart-check"></i><div class="title">Ventas</div><small>Vender / Fiar</small></div>
    </div>
  </div>

  <!-- Ingreso (mantenido del diseño anterior) -->
  <div class="screen" id="screenIngreso">
    <button class="btn btn-outline" onclick="cambiarModo('inicio')" style="width:auto;"><i class="bi bi-arrow-left"></i> Volver</button>
    <div class="card">
      <div class="card-header"><i class="bi bi-upc-scan"></i> Escáner</div>
      <div class="scanner-wrapper"><div id="readerIngreso"></div><button class="flash-btn" id="btnFlashIngreso"><i class="bi bi-lightning-charge"></i></button></div>
      <button class="btn btn-outline" id="btnScanIngreso"><i class="bi bi-camera"></i> Activar cámara</button>
    </div>
    <div class="card">
      <div class="card-header"><i class="bi bi-info-circle"></i> Datos</div>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <div style="flex:3;"><div class="input-group"><span><i class="bi bi-upc"></i></span><input type="text" id="codigoIngreso" placeholder="Código"></div></div>
        <button class="btn btn-outline" id="btnBuscarIngreso" style="flex:1;"><i class="bi bi-search"></i></button>
      </div>
      <input type="text" id="nombreIngreso" class="input-standard" placeholder="Nombre" style="margin-bottom:12px;">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <div style="flex:1;"><div class="input-group"><span><i class="bi bi-hash"></i></span><input type="number" id="cantidadIngreso" value="1" min="1"></div></div>
        <div style="flex:1;"><div class="input-group"><span>Bs</span><input type="number" id="costoTotalBs" step="0.01" min="0" placeholder="0.00"></div></div>
      </div>
      <div id="previewCostoUnitario" style="background:#f1f5f9; border-radius:12px; padding:10px; text-align:center;">Costo unitario: <strong>$0.00</strong></div>
      <div style="margin-top:12px;"><div class="input-group"><span>$</span><input type="number" id="pvpUsdIngreso" step="0.01" min="0" placeholder="PVP"></div></div>
      <div id="previewGananciaIngreso" style="margin-top:12px; background:#f0fdf4; border-radius:12px; padding:10px; text-align:center;">Ganancia: --</div>
    </div>
    <button class="btn btn-primary" id="btnGuardarIngreso"><i class="bi bi-save2"></i> Guardar inventario</button>
    <div id="mensajeIngreso" style="text-align:center; font-size:0.9rem;"></div>
  </div>

  <!-- Ventas (nuevo flujo) -->
  <div class="screen" id="screenVentas">
    <button class="btn btn-outline" onclick="cambiarModo('inicio')" style="width:auto;"><i class="bi bi-arrow-left"></i> Volver</button>
    <div class="card">
      <div class="card-header"><i class="bi bi-upc-scan"></i> Buscar producto</div>
      <div class="scanner-wrapper"><div id="readerVentas"></div><button class="flash-btn" id="btnFlashVentas"><i class="bi bi-lightning-charge"></i></button></div>
      <button class="btn btn-outline" id="btnScanVentas"><i class="bi bi-camera"></i> Escanear</button>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <div style="flex:3;"><div class="input-group"><span><i class="bi bi-upc"></i></span><input type="text" id="codigoVenta" placeholder="Código"></div></div>
        <button class="btn btn-outline" id="btnBuscarVenta" style="flex:1;"><i class="bi bi-search"></i></button>
      </div>
      <!-- Info producto encontrado (no editable) -->
      <div id="infoProductoVenta" style="display:none; margin-top:14px; background:#f8fafc; border-radius:16px; padding:14px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><strong id="nombreVentaInfo"></strong><br><small class="text-muted">Stock: <span id="stockVentaInfo"></span></small></div>
          <div style="font-size:1.4rem; font-weight:700; color:#2563eb;" id="precioVentaInfo"></div>
        </div>
        <button class="btn btn-primary" id="btnAgregarCarrito" style="margin-top:12px;"><i class="bi bi-cart-plus"></i> Agregar al carrito</button>
      </div>
      <div id="noEncontradoVenta" style="display:none; margin-top:14px; color:#dc2626; text-align:center;">Producto no encontrado. Debe ingresarlo primero.</div>
    </div>

    <!-- Carrito -->
    <div class="card">
      <div class="card-header"><i class="bi bi-basket"></i> Carrito <span id="cantidadItems" class="badge">0</span></div>
      <div id="listaCarrito" style="max-height:200px; overflow-y:auto;"></div>
      <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; padding-top:12px; border-top:2px solid #e2e8f0;">
        <span>Total:</span><span id="totalCarrito">$0.00</span>
      </div>
    </div>

    <!-- Finalizar venta -->
    <div class="card">
      <div class="card-header"><i class="bi bi-check2-circle"></i> Finalizar</div>
      <select id="tipoVenta" class="input-standard" style="margin-bottom:12px;">
        <option value="contado">Contado</option><option value="fiado">Fiado</option>
      </select>
      <div id="seccionCliente" style="display:none; margin-bottom:12px;">
        <select id="selectCliente" class="input-standard" style="margin-bottom:8px;"></select>
        <button class="btn btn-outline" id="btnNuevoCliente"><i class="bi bi-person-plus"></i> Nuevo cliente</button>
      </div>
      <button class="btn btn-success" id="btnFinalizarVenta"><i class="bi bi-check-lg"></i> Registrar venta</button>
    </div>
    <div id="mensajeVenta" style="text-align:center; font-size:0.9rem;"></div>
  </div>
</div>

<!-- Modal cantidad -->
<div id="modalCantidad" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h4 style="margin-bottom:8px;" id="modalNombreProducto"></h4>
    <p style="color:#64748b;">Precio: $<span id="modalPrecio"></span> | Stock: <span id="modalStock"></span></p>
    <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin:20px 0;">
      <button id="btnMenos" style="width:44px; height:44px; border-radius:50%; border:2px solid #e2e8f0; background:white; font-size:1.5rem;">−</button>
      <span id="modalCantidadValor" style="font-size:2rem; font-weight:700; min-width:60px; text-align:center;">1</span>
      <button id="btnMas" style="width:44px; height:44px; border-radius:50%; border:2px solid #e2e8f0; background:white; font-size:1.5rem;">+</button>
    </div>
    <div style="text-align:center; font-size:1.2rem; margin-bottom:20px;">Subtotal: <strong id="modalSubtotal">$0.00</strong></div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline" id="btnCancelarModal">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmarModal">Agregar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
  (function() {
    const SUPABASE_URL = "https://omgfilhksmfvbprzejxg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZ2ZpbGhrc21mdmJwcnplanhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNzU0NTgsImV4cCI6MjA5ODk1MTQ1OH0.6JpnsUYiuLJ_Jty_PtBSOFxfbLl0r7reiYnnvXoBJpQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let tasaDolar = 1;
    let scannerIngreso = null, scannerVentas = null;
    let productoActualVenta = null; // { id, nombre, precio_venta, stock }
    let carrito = []; // [{ id, nombre, precio, cantidad, stock }]

    // Tasa BCV
    async function obtenerTasaBCV() {
      try {
        const resp = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
        const data = await resp.json();
        tasaDolar = parseFloat(data.promedio);
        document.getElementById('tasa-valor').textContent = `Bs ${tasaDolar.toFixed(2)}`;
      } catch (e) { document.getElementById('tasa-valor').textContent = 'Error'; }
    }
    obtenerTasaBCV();

    window.cambiarModo = function(modo) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      if (modo === 'inicio') { document.getElementById('screenInicio').classList.add('active'); detenerScanners(); }
      else if (modo === 'ingreso') document.getElementById('screenIngreso').classList.add('active');
      else if (modo === 'ventas') { document.getElementById('screenVentas').classList.add('active'); cargarClientes(); }
    };

    function detenerScanners() {
      if (scannerIngreso?.isScanning) scannerIngreso.stop();
      if (scannerVentas?.isScanning) scannerVentas.stop();
    }

    // ========== INGRESO (simplificado, sin cambios mayores) ==========
    document.getElementById('btnFlashIngreso').addEventListener('click', async () => {
      if (!scannerIngreso?.isScanning) return;
      try { await scannerIngreso.applyVideoConstraints({ advanced: [{ torch: !document.getElementById('btnFlashIngreso').classList.contains('active') }] }); document.getElementById('btnFlashIngreso').classList.toggle('active'); } catch(e){}
    });
    document.getElementById('btnScanIngreso').addEventListener('click', () => {
      if (!scannerIngreso) scannerIngreso = new Html5Qrcode("readerIngreso");
      scannerIngreso.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
        (text) => { document.getElementById('codigoIngreso').value = text; buscarProductoIngreso(text); scannerIngreso.stop(); }, ()=>{})
      .catch(() => alert('Error de cámara'));
    });
    async function buscarProductoIngreso(codigo) {
      const { data } = await supabase.from('productos').select('*').eq('codigo_barras', codigo).single();
      if (data) {
        document.getElementById('nombreIngreso').value = data.nombre;
        document.getElementById('costoTotalBs').value = (parseFloat(data.precio_compra||0)*tasaDolar).toFixed(2);
        document.getElementById('pvpUsdIngreso').value = parseFloat(data.precio_venta||0).toFixed(2);
        calcularIngreso();
      } else { document.getElementById('nombreIngreso').value = ''; }
    }
    function calcularIngreso() {
      const qty = parseInt(document.getElementById('cantidadIngreso').value)||1, totalBs = parseFloat(document.getElementById('costoTotalBs').value)||0, pvp = parseFloat(document.getElementById('pvpUsdIngreso').value)||0;
      if(tasaDolar===1) return;
      const uBs = totalBs/qty, uUsd = uBs/tasaDolar;
      document.getElementById('previewCostoUnitario').innerHTML = `Costo unitario: <strong>$${uUsd.toFixed(2)}</strong>`;
      document.getElementById('previewGananciaIngreso').innerHTML = (uUsd>0 && pvp>0) ? `Ganancia: $${(pvp-uUsd).toFixed(2)} (${(((pvp-uUsd)/uUsd)*100).toFixed(1)}%)` : '--';
    }
    ['cantidadIngreso','costoTotalBs','pvpUsdIngreso'].forEach(id => document.getElementById(id).addEventListener('input', calcularIngreso));
    document.getElementById('btnBuscarIngreso').addEventListener('click', ()=> buscarProductoIngreso(document.getElementById('codigoIngreso').value.trim()));
    document.getElementById('btnGuardarIngreso').addEventListener('click', async () => {
      const codigo = document.getElementById('codigoIngreso').value.trim(), nombre = document.getElementById('nombreIngreso').value.trim();
      const pvp = parseFloat(document.getElementById('pvpUsdIngreso').value), cantidad = parseInt(document.getElementById('cantidadIngreso').value), totalBs = parseFloat(document.getElementById('costoTotalBs').value);
      if(!codigo||!nombre||isNaN(pvp)||isNaN(cantidad)||totalBs<=0) return;
      const uUsd = (totalBs/cantidad)/tasaDolar;
      try {
        let prodId = (await supabase.from('productos').select('id').eq('codigo_barras', codigo).single())?.data?.id;
        if(prodId) await supabase.from('productos').update({nombre, precio_compra:uUsd, precio_venta:pvp}).eq('id',prodId);
        else { const {data} = await supabase.from('productos').insert({codigo_barras:codigo, nombre, precio_compra:uUsd, precio_venta:pvp}).select().single(); prodId = data.id; }
        await supabase.from('entradas_inventario').insert({producto_id:prodId, cantidad, precio_unitario:uUsd});
        document.getElementById('mensajeIngreso').innerHTML = '<span style="color:#059669;">¡Registrado!</span>';
      } catch(e) { document.getElementById('mensajeIngreso').innerHTML = '<span style="color:#dc2626;">Error</span>'; }
    });

    // ========== VENTAS (nuevo flujo) ==========
    document.getElementById('btnFlashVentas').addEventListener('click', async () => {
      if (!scannerVentas?.isScanning) return;
      try { await scannerVentas.applyVideoConstraints({ advanced: [{ torch: !document.getElementById('btnFlashVentas').classList.contains('active') }] }); document.getElementById('btnFlashVentas').classList.toggle('active'); } catch(e){}
    });
    document.getElementById('btnScanVentas').addEventListener('click', () => {
      if (!scannerVentas) scannerVentas = new Html5Qrcode("readerVentas");
      scannerVentas.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
        (text) => { document.getElementById('codigoVenta').value = text; buscarProductoVenta(text); scannerVentas.stop(); }, ()=>{})
      .catch(() => alert('Error de cámara'));
    });
    document.getElementById('btnBuscarVenta').addEventListener('click', ()=> buscarProductoVenta(document.getElementById('codigoVenta').value.trim()));

    async function buscarProductoVenta(codigo) {
      const { data } = await supabase.from('productos').select('*').eq('codigo_barras', codigo).single();
      const infoDiv = document.getElementById('infoProductoVenta');
      const noDiv = document.getElementById('noEncontradoVenta');
      if (!data) { infoDiv.style.display = 'none'; noDiv.style.display = 'block'; return; }
      // Calcular stock
      const { data: entradas } = await supabase.from('entradas_inventario').select('cantidad').eq('producto_id', data.id);
      const totalEntradas = entradas?.reduce((s,e)=>s+e.cantidad,0)||0;
      const { data: ventas } = await supabase.from('ventas').select('cantidad').eq('producto_id', data.id);
      const totalVendido = ventas?.reduce((s,v)=>s+v.cantidad,0)||0;
      const stock = totalEntradas - totalVendido;
      productoActualVenta = { id: data.id, nombre: data.nombre, precio_venta: parseFloat(data.precio_venta||0), stock };
      document.getElementById('nombreVentaInfo').textContent = data.nombre;
      document.getElementById('stockVentaInfo').textContent = stock;
      document.getElementById('precioVentaInfo').textContent = `$${productoActualVenta.precio_venta.toFixed(2)}`;
      infoDiv.style.display = 'block'; noDiv.style.display = 'none';
    }

    // Modal cantidad
    let modalProducto = null, modalCantidad = 1;
    document.getElementById('btnAgregarCarrito').addEventListener('click', () => {
      if (!productoActualVenta || productoActualVenta.stock <= 0) return;
      modalProducto = productoActualVenta;
      modalCantidad = 1;
      document.getElementById('modalNombreProducto').textContent = modalProducto.nombre;
      document.getElementById('modalPrecio').textContent = modalProducto.precio_venta.toFixed(2);
      document.getElementById('modalStock').textContent = modalProducto.stock;
      document.getElementById('modalCantidadValor').textContent = modalCantidad;
      actualizarSubtotalModal();
      document.getElementById('modalCantidad').style.display = 'flex';
    });
    document.getElementById('btnMas').addEventListener('click', () => {
      if (modalProducto && modalCantidad < modalProducto.stock) { modalCantidad++; document.getElementById('modalCantidadValor').textContent = modalCantidad; actualizarSubtotalModal(); }
    });
    document.getElementById('btnMenos').addEventListener('click', () => {
      if (modalCantidad > 1) { modalCantidad--; document.getElementById('modalCantidadValor').textContent = modalCantidad; actualizarSubtotalModal(); }
    });
    function actualizarSubtotalModal() {
      document.getElementById('modalSubtotal').textContent = `$${(modalCantidad * modalProducto.precio_venta).toFixed(2)}`;
    }
    document.getElementById('btnCancelarModal').addEventListener('click', () => document.getElementById('modalCantidad').style.display = 'none');
    document.getElementById('btnConfirmarModal').addEventListener('click', () => {
      if (!modalProducto) return;
      // Verificar si ya existe en carrito
      const idx = carrito.findIndex(item => item.id === modalProducto.id);
      if (idx >= 0) {
        carrito[idx].cantidad = Math.min(carrito[idx].cantidad + modalCantidad, modalProducto.stock);
      } else {
        carrito.push({ id: modalProducto.id, nombre: modalProducto.nombre, precio: modalProducto.precio_venta, cantidad: modalCantidad, stock: modalProducto.stock });
      }
      renderCarrito();
      document.getElementById('modalCantidad').style.display = 'none';
      document.getElementById('infoProductoVenta').style.display = 'none';
      productoActualVenta = null;
    });

    function renderCarrito() {
      const lista = document.getElementById('listaCarrito');
      lista.innerHTML = carrito.map((item, i) => `
        <div class="cart-item">
          <div class="info"><strong>${item.nombre}</strong><br><small>$${item.precio.toFixed(2)} c/u</small></div>
          <div class="qty-control">
            <button onclick="cambiarCantidadCarrito(${i}, -1)">−</button>
            <span>${item.cantidad}</span>
            <button onclick="cambiarCantidadCarrito(${i}, 1)">+</button>
          </div>
          <div style="font-weight:600;">$${(item.cantidad*item.precio).toFixed(2)}</div>
        </div>
      `).join('');
      document.getElementById('cantidadItems').textContent = carrito.reduce((s,i)=>s+i.cantidad,0);
      document.getElementById('totalCarrito').textContent = `$${carrito.reduce((s,i)=>s+(i.cantidad*i.precio),0).toFixed(2)}`;
    }
    window.cambiarCantidadCarrito = function(index, delta) {
      const item = carrito[index];
      const nueva = item.cantidad + delta;
      if (nueva < 1) { carrito.splice(index,1); }
      else if (nueva > item.stock) { alert('Stock máximo: '+item.stock); }
      else { item.cantidad = nueva; }
      renderCarrito();
    };

    // Clientes y tipo venta
    document.getElementById('tipoVenta').addEventListener('change', function() {
      document.getElementById('seccionCliente').style.display = this.value === 'fiado' ? 'block' : 'none';
    });
    async function cargarClientes() {
      const { data } = await supabase.from('clientes').select('*').order('nombre');
      document.getElementById('selectCliente').innerHTML = data?.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')||'';
    }
    document.getElementById('btnNuevoCliente').addEventListener('click', async () => {
      const nombre = prompt('Nombre del cliente:');
      if (!nombre) return;
      const telefono = prompt('Teléfono (opcional):');
      const { data } = await supabase.from('clientes').insert({ nombre, telefono }).select().single();
      if (data) { await cargarClientes(); document.getElementById('selectCliente').value = data.id; }
    });

    document.getElementById('btnFinalizarVenta').addEventListener('click', async () => {
      if (carrito.length === 0) { document.getElementById('mensajeVenta').innerHTML = '<span style="color:#dc2626;">Carrito vacío</span>'; return; }
      const tipo = document.getElementById('tipoVenta').value;
      let clienteId = null;
      if (tipo === 'fiado') {
        clienteId = document.getElementById('selectCliente').value;
        if (!clienteId) { document.getElementById('mensajeVenta').innerHTML = '<span style="color:#dc2626;">Seleccione un cliente</span>'; return; }
      }
      try {
        for (const item of carrito) {
          await supabase.from('ventas').insert({
            producto_id: item.id, cantidad: item.cantidad, precio_venta_usd: item.precio, tipo_venta: tipo, cliente_id: clienteId || null
          });
        }
        carrito = []; renderCarrito();
        document.getElementById('mensajeVenta').innerHTML = '<span style="color:#059669;">¡Venta registrada!</span>';
      } catch(e) { document.getElementById('mensajeVenta').innerHTML = '<span style="color:#dc2626;">Error al registrar</span>'; }
    });
  })();
</script>
</body>
</html>
