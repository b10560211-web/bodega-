<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escáner de bodega</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #212529; color: white; }
    .scanner-container { max-width: 400px; margin: auto; padding: 20px; }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; background: #000; }
    .card { background: #343a40; border: none; }
    .btn-detener { display: none; }
    .resultado { background: #198754; padding: 10px; border-radius: 8px; }
    .error { background: #dc3545; padding: 10px; border-radius: 8px; }
    .warning { background: #ffc107; color: #000; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="scanner-container">
    <h2 class="text-center mb-3">📷 Escáner de productos</h2>
    <div id="reader"></div>
    <div class="d-grid gap-2">
      <button id="btn-iniciar" class="btn btn-primary btn-lg">▶️ Iniciar cámara</button>
      <button id="btn-detener" class="btn btn-outline-danger btn-detener">⏹️ Detener</button>
    </div>
    <div id="status-message"></div>
    <div id="resultado-escaneo" class="mt-3"></div>

    <div id="form-entrada" class="card mt-3 p-3" style="display: none;">
      <h5 class="text-success">Producto encontrado</h5>
      <p id="nombre-producto" class="fw-bold"></p>
      <div class="mb-2">
        <label class="form-label">Cantidad</label>
        <input type="number" id="cantidad-movil" class="form-control" min="1" value="1">
      </div>
      <div class="mb-3">
        <label class="form-label">Precio unitario ($)</label>
        <input type="number" id="precio-movil" class="form-control" step="0.01" min="0" value="0.00">
      </div>
      <button id="guardar-movil" class="btn btn-success w-100">💾 Registrar entrada</button>
      <button id="cancelar-movil" class="btn btn-outline-light w-100 mt-2">Cancelar</button>
    </div>
  </div>

  <!-- Librerías (cargar solo una vez) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // IIFE para evitar cualquier conflicto de variables globales
    (function() {
      console.log('🚀 Nueva versión de escáner cargada (v2)');

      // Verificar librerías
      if (typeof Html5Qrcode === 'undefined') {
        document.getElementById('status-message').innerHTML = '<div class="error">❌ Librería de cámara no disponible. Recarga la página.</div>';
        return;
      }
      if (typeof window.supabase === 'undefined') {
        document.getElementById('status-message').innerHTML = '<div class="error">❌ Librería de Supabase no disponible.</div>';
        return;
      }

      const SUPABASE_URL = "https://omgfilhksmfvbprzejxg.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZ2ZpbGhrc21mdmJwcnplanhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNzU0NTgsImV4cCI6MjA5ODk1MTQ1OH0.6JpnsUYiuLJ_Jty_PtBSOFxfbLl0r7reiYnnvXoBJpQ";
      // No declaramos 'supabase' en global, lo guardamos localmente
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let html5QrCode = null;
      let productoActual = null;

      const btnIniciar = document.getElementById('btn-iniciar');
      const btnDetener = document.getElementById('btn-detener');
      const statusMsg = document.getElementById('status-message');
      const resultadoDiv = document.getElementById('resultado-escaneo');
      const formDiv = document.getElementById('form-entrada');

      // Verificar contexto seguro
      if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        statusMsg.innerHTML = '<div class="warning">⚠️ La cámara requiere HTTPS. Este sitio es GitHub Pages (HTTPS), debería funcionar.</div>';
        btnIniciar.disabled = true;
      }

      // Iniciar cámara
      async function iniciarCamara() {
        try {
          if (html5QrCode) {
            await html5QrCode.stop().catch(() => {});
            html5QrCode = null;
          }
          statusMsg.innerHTML = '';
          resultadoDiv.innerHTML = '';
          formDiv.style.display = 'none';

          html5QrCode = new Html5Qrcode("reader");
          const config = { fps: 10, qrbox: { width: 250, height: 150 } };

          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
              html5QrCode.stop().then(() => {
                btnIniciar.style.display = 'block';
                btnDetener.style.display = 'none';
                buscarProducto(decodedText);
              });
            },
            () => {} // ignorar errores de escaneo
          );

          btnIniciar.style.display = 'none';
          btnDetener.style.display = 'block';
          statusMsg.innerHTML = '<div class="text-info">🔍 Escaneando... Apunta a un código de barras.</div>';
        } catch (err) {
          console.error('Error cámara:', err);
          let msg = 'Error al iniciar cámara.';
          if (err.name === 'NotAllowedError') msg = 'Permiso de cámara denegado. Actívalo en configuración del navegador.';
          else if (err.name === 'NotFoundError') msg = 'No se encontró cámara.';
          statusMsg.innerHTML = `<div class="error">❌ ${msg}</div>`;
          btnIniciar.style.display = 'block';
          btnDetener.style.display = 'none';
        }
      }

      btnIniciar.addEventListener('click', iniciarCamara);

      btnDetener.addEventListener('click', async () => {
        if (html5QrCode && html5QrCode.isScanning) {
          await html5QrCode.stop().catch(() => {});
          btnIniciar.style.display = 'block';
          btnDetener.style.display = 'none';
          statusMsg.innerHTML = '<div class="text-muted">Cámara detenida.</div>';
        }
      });

      async function buscarProducto(codigo) {
        try {
          const { data, error } = await client.from('productos').select('*').eq('codigo_barras', codigo).single();
          if (error || !data) {
            resultadoDiv.innerHTML = `<div class="error">❌ Código no encontrado: ${codigo}</div>`;
            productoActual = null;
            formDiv.style.display = 'none';
            return;
          }
          productoActual = data;
          resultadoDiv.innerHTML = `<div class="resultado">✅ ${data.nombre} (Ref: $${parseFloat(data.precio_compra).toFixed(2)})</div>`;
          document.getElementById('nombre-producto').textContent = data.nombre;
          document.getElementById('precio-movil').value = data.precio_compra || 0;
          formDiv.style.display = 'block';
        } catch (err) {
          console.error(err);
          resultadoDiv.innerHTML = '<div class="error">Error de conexión con la base de datos.</div>';
        }
      }

      document.getElementById('guardar-movil').addEventListener('click', async () => {
        if (!productoActual) return;
        const cantidad = parseInt(document.getElementById('cantidad-movil').value);
        const precio = parseFloat(document.getElementById('precio-movil').value);
        if (isNaN(cantidad) || cantidad <= 0) return alert('Cantidad inválida');
        if (isNaN(precio) || precio <= 0) return alert('Precio inválido');

        try {
          const { error } = await client.from('entradas_inventario').insert({
            producto_id: productoActual.id,
            cantidad,
            precio_unitario: precio
          });
          if (error) throw error;
          alert(`✅ Entrada guardada: ${cantidad} ud. de "${productoActual.nombre}"`);
          productoActual = null;
          formDiv.style.display = 'none';
          resultadoDiv.innerHTML = '';
          btnIniciar.style.display = 'block';
        } catch (err) {
          alert('Error al guardar: ' + err.message);
        }
      });

      document.getElementById('cancelar-movil').addEventListener('click', () => {
        productoActual = null;
        formDiv.style.display = 'none';
        resultadoDiv.innerHTML = '';
        btnIniciar.style.display = 'block';
      });

      // Al cargar
      window.addEventListener('load', () => {
        btnIniciar.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
